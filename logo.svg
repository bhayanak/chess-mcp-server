<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="knightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e2e2;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#3a7bd5" stroke-width="4"/>

  <!-- Circuit board pattern (AI motif) -->
  <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#glow)">
    <!-- Horizontal lines -->
    <line x1="60" y1="120" x2="160" y2="120"/>
    <line x1="350" y1="120" x2="450" y2="120"/>
    <line x1="60" y1="390" x2="160" y2="390"/>
    <line x1="350" y1="390" x2="450" y2="390"/>

    <!-- Vertical lines -->
    <line x1="100" y1="80" x2="100" y2="160"/>
    <line x1="412" y1="80" x2="412" y2="160"/>
    <line x1="100" y1="350" x2="100" y2="430"/>
    <line x1="412" y1="350" x2="412" y2="430"/>

    <!-- Connection dots -->
    <circle cx="100" cy="120" r="4" fill="url(#circuitGrad)"/>
    <circle cx="160" cy="120" r="3" fill="url(#circuitGrad)"/>
    <circle cx="412" cy="120" r="4" fill="url(#circuitGrad)"/>
    <circle cx="350" cy="120" r="3" fill="url(#circuitGrad)"/>
    <circle cx="100" cy="390" r="4" fill="url(#circuitGrad)"/>
    <circle cx="160" cy="390" r="3" fill="url(#circuitGrad)"/>
    <circle cx="412" cy="390" r="4" fill="url(#circuitGrad)"/>
    <circle cx="350" cy="390" r="3" fill="url(#circuitGrad)"/>

    <!-- Diagonal traces -->
    <line x1="130" y1="120" x2="170" y2="160"/>
    <line x1="382" y1="120" x2="342" y2="160"/>
    <line x1="130" y1="390" x2="170" y2="350"/>
    <line x1="382" y1="390" x2="342" y2="350"/>

    <!-- Additional circuit elements -->
    <rect x="75" y="195" width="20" height="12" rx="2"/>
    <rect x="417" y="195" width="20" height="12" rx="2"/>
    <rect x="75" y="305" width="20" height="12" rx="2"/>
    <rect x="417" y="305" width="20" height="12" rx="2"/>

    <line x1="95" y1="201" x2="140" y2="201"/>
    <line x1="372" y1="201" x2="417" y2="201"/>
    <line x1="95" y1="311" x2="140" y2="311"/>
    <line x1="372" y1="311" x2="417" y2="311"/>
  </g>

  <!-- Chess knight piece -->
  <g transform="translate(256, 280)" filter="url(#shadow)">
    <!-- Base -->
    <rect x="-70" y="70" width="140" height="25" rx="8" fill="url(#knightGrad)" opacity="0.9"/>
    <rect x="-55" y="55" width="110" height="20" rx="5" fill="url(#knightGrad)"/>

    <!-- Knight body -->
    <path d="
      M -40,55
      L -45,20
      C -48,-10 -40,-40 -30,-60
      C -20,-80 -10,-100 -5,-120
      C 0,-135 10,-145 20,-150
      C 30,-155 40,-148 45,-135
      C 50,-122 48,-105 40,-90
      L 30,-75
      C 35,-70 45,-60 50,-45
      C 55,-30 55,-10 50,10
      L 45,55
      Z
    " fill="url(#knightGrad)" stroke="#999" stroke-width="1.5"/>

    <!-- Knight ear -->
    <path d="
      M 5,-140
      C 0,-160 5,-175 15,-175
      C 25,-175 30,-160 25,-145
    " fill="url(#knightGrad)" stroke="#999" stroke-width="1"/>

    <!-- Knight eye -->
    <circle cx="20" cy="-110" r="6" fill="#1a1a2e"/>
    <circle cx="22" cy="-112" r="2" fill="#fff"/>

    <!-- Knight nostril -->
    <circle cx="-15" cy="-65" r="3" fill="#888"/>

    <!-- Knight mane -->
    <path d="
      M -5,-140
      C -15,-130 -25,-115 -30,-100
      C -35,-85 -38,-70 -40,-55
    " fill="none" stroke="#bbb" stroke-width="3" stroke-linecap="round"/>
    <path d="
      M 0,-135
      C -10,-125 -20,-110 -25,-95
      C -30,-80 -33,-65 -35,-50
    " fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>

    <!-- Mouth line -->
    <path d="M -30,-60 C -20,-55 -10,-58 0,-65" fill="none" stroke="#888" stroke-width="1.5"/>
  </g>

  <!-- Crown on top -->
  <g transform="translate(256, 115)" filter="url(#glow)">
    <path d="
      M -30,15
      L -35,-5
      L -20,5
      L -10,-15
      L 0,5
      L 10,-15
      L 20,5
      L 35,-5
      L 30,15
      Z
    " fill="url(#crownGrad)" stroke="#cc8800" stroke-width="1.5"/>
    <!-- Crown jewels -->
    <circle cx="-10" cy="-10" r="3" fill="#ff4444"/>
    <circle cx="10" cy="-10" r="3" fill="#4444ff"/>
    <circle cx="0" cy="0" r="3" fill="#44ff44"/>
    <!-- Crown base -->
    <rect x="-30" y="15" width="60" height="6" rx="2" fill="url(#crownGrad)" stroke="#cc8800" stroke-width="1"/>
  </g>

  <!-- Glowing ring around the knight -->
  <circle cx="256" cy="260" r="130" fill="none" stroke="url(#circuitGrad)" stroke-width="1.5" opacity="0.3" stroke-dasharray="8 6"/>

  <!-- Text: "MCP" at bottom -->
  <text x="256" y="460" text-anchor="middle" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#00d2ff" filter="url(#glow)" letter-spacing="8">MCP</text>
</svg>
